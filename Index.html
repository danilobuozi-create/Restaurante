<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF6B35">
    <title>Restaurant Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #FF6B35; --success: #2ECC71; --warning: #F39C12; --danger: #E74C3C; }
        body { font-family: -apple-system, sans-serif; background: #f5f6fa; color: #2c3e50; height: 100vh; overflow: hidden; }
        .screen { height: 100vh; }
        .login-screen { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FF6B35, #004E89); padding: 20px; }
        .login-card { background: white; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; }
        .login-logo { text-align: center; font-size: 60px; margin-bottom: 20px; }
        .login-card h1 { text-align: center; margin-bottom: 30px; font-size: 22px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #FF6B35; }
        .btn { width: 100%; padding: 16px; background: #FF6B35; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn:active { transform: scale(0.98); }
        .app-header { background: white; padding: 16px; text-align: center; font-size: 20px; font-weight: 700; border-bottom: 1px solid #eee; }
        .content { flex: 1; overflow-y: auto; padding: 16px; }
        .bottom-nav { background: white; display: flex; border-top: 1px solid #eee; padding: 8px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #7f8c8d; font-size: 11px; padding: 8px; cursor: pointer; }
        .nav-btn.active { color: #FF6B35; font-weight: 600; }
        .nav-btn i { font-size: 22px; }
        .tables-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .table-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; border: 2px solid transparent; }
        .table-card:active { transform: scale(0.97); }
        .table-card.free { border-color: #2ECC71; }
        .table-card.occupied { border-color: #F39C12; }
        .table-number { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .table-status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
        .status-free { background: rgba(46,204,113,0.1); color: #2ECC71; }
        .status-occupied { background: rgba(243,156,18,0.1); color: #F39C12; }
        .table-total { font-size: 18px; font-weight: 700; color: #FF6B35; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .product-item { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid #eee; cursor: pointer; }
        .product-item:active { background: #f5f5f5; }
        .product-price { color: #FF6B35; font-weight: 700; }
        .order-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .total-section { margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; display: flex; justify-content: space-between; font-size: 24px; font-weight: 700; }
        .kitchen-order { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #FF6B35; }
        .kitchen-order-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .kitchen-table { font-weight: 700; font-size: 18px; }
        .toast { position: fixed; top: 20px; left: 20px; right: 20px; background: #333; color: white; padding: 16px; border-radius: 12px; z-index: 9999; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen" class="screen login-screen">
    <div class="login-card">
        <div class="login-logo">🍽️</div>
        <h1>Restaurant Manager</h1>
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="seu@email.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="password" placeholder="••••••"></div>
        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<!-- APP PRINCIPAL -->
<div id="appScreen" class="screen hidden" style="display: flex; flex-direction: column;">
    <div class="app-header">🍽️ Restaurant Manager</div>
    <div class="content" id="mainContent"></div>
    <div class="bottom-nav">
        <button class="nav-btn active" onclick="showView('tables')"><i class="fas fa-th-large"></i><span>Mesas</span></button>
        <button class="nav-btn" onclick="showView('orders')"><i class="fas fa-list"></i><span>Comandas</span></button>
        <button class="nav-btn" onclick="showView('kitchen')"><i class="fas fa-fire"></i><span>Cozinha</span></button>
        <button class="nav-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Sair</span></button>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
// ========== SUAS CHAVES SUPABASE ==========
const SUPABASE_URL = 'https://egoygpilshbzkpbznglu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnb3lncGlsc2hiemtwYnpuZ2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDA1OTgsImV4cCI6MjA5MzkxNjU5OH0.xpWw1jwdMK_lJxSF5IzUtsMt-H2PA8E1O8uai_QoUBc';
// ==========================================

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if (!email || !password) { alert('Preencha todos os campos!'); return; }
    
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    
    if (error) {
        alert('❌ Erro: ' + error.message);
    } else {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        loadTables();
    }
}

async function logout() {
    await db.auth.signOut();
    document.getElementById('appScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
}

async function showView(view) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.closest('.nav-btn').classList.add('active');
    
    if (view === 'tables') await loadTables();
    if (view === 'orders') await loadOrders();
    if (view === 'kitchen') await loadKitchen();
}

async function loadTables() {
    const { data: tables } = await db.from('tables').select('*').order('number');
    document.getElementById('mainContent').innerHTML = '<div class="tables-grid">' + 
        tables.map(t => `
            <div class="table-card ${t.status}" onclick="openTable(${t.id}, '${t.status}')">
                <div class="table-number">Mesa ${t.number}</div>
                <div class="table-status ${t.status === 'free' ? 'status-free' : 'status-occupied'}">${t.status === 'free' ? 'Livre' : 'Ocupada'}</div>
                ${t.current_total ? `<div class="table-total">R$ ${t.current_total.toFixed(2)}</div>` : ''}
            </div>
        `).join('') + '</div>';
}

async function openTable(tableId, status) {
    if (status === 'free') {
        await createOrder(tableId);
    } else {
        await loadTableOrder(tableId);
    }
}

async function createOrder(tableId) {
    const { data: userData } = await db.auth.getUser();
    const { data: order, error } = await db.from('orders').insert({
        table_id: tableId,
        waiter_id: userData.user.id,
        status: 'open'
    }).select().single();
    
    if (error) { alert('Erro: ' + error.message); return; }
    
    await db.from('tables').update({ status: 'occupied' }).eq('id', tableId);
    
    // Mostrar produtos
    const { data: products } = await db.from('products').select('*').eq('is_active', true);
    
    document.getElementById('modalContent').innerHTML = `
        <h2 style="margin-bottom:16px">Adicionar Produtos</h2>
        ${products.map(p => `
            <div class="product-item" onclick="addProduct('${order.id}', '${p.id}', '${p.name}', ${p.price})">
                <span>${p.name}</span>
                <span class="product-price">R$ ${p.price.toFixed(2)}</span>
            </div>
        `).join('')}
        <button class="btn" onclick="closeModal(); loadTables();">Finalizar</button>
    `;
    document.getElementById('modal').classList.add('active');
}

async function addProduct(orderId, productId, name, price) {
    await db.from('order_items').insert({
        order_id: orderId,
        product_id: productId,
        product_name: name,
        quantity: 1,
        unit_price: price,
        total_price: price
    });
    
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = '✅ ' + name + ' adicionado!';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

async function loadTableOrder(tableId) {
    const { data: order } = await db.from('orders').select('*, order_items(*)').eq('table_id', tableId).eq('status', 'open').single();
    
    if (!order) { alert('Nenhuma comanda aberta'); return; }
    
    const items = order.order_items || [];
    const total = items.reduce((s, i) => s + (i.total_price || 0), 0);
    
    document.getElementById('modalContent').innerHTML = `
        <h2>Mesa ${tableId}</h2>
        ${items.map(i => `<div class="order-item"><span>${i.quantity}x ${i.product_name}</span><span>R$ ${i.total_price.toFixed(2)}</span></div>`).join('')}
        <div class="total-section"><span>Total</span><span>R$ ${total.toFixed(2)}</span></div>
        <button class="btn" onclick="addMoreProducts('${order.id}', ${tableId})">+ Produtos</button>
        <button class="btn" style="background:#E74C3C; margin-top:8px" onclick="closeOrder('${order.id}', ${tableId})">Fechar Conta</button>
    `;
    document.getElementById('modal').classList.add('active');
}

async function addMoreProducts(orderId, tableId) {
    const { data: products } = await db.from('products').select('*').eq('is_active', true);
    document.getElementById('modalContent').innerHTML = `
        <h2>Adicionar Produtos</h2>
        ${products.map(p => `
            <div class="product-item" onclick="addProduct('${orderId}', '${p.id}', '${p.name}', ${p.price})">
                <span>${p.name}</span><span class="product-price">R$ ${p.price.toFixed(2)}</span>
            </div>
        `).join('')}
        <button class="btn" onclick="closeModal(); loadTables();">Finalizar</button>
    `;
}

async function closeOrder(orderId, tableId) {
    if (!confirm('Fechar esta comanda?')) return;
    
    const method = prompt('Pagamento:\n1-Dinheiro\n2-Pix\n3-Cartão');
    const methods = {'1':'Dinheiro','2':'Pix','3':'Cartão'};
    
    await db.from('orders').update({ status: 'completed', payment_method: methods[method] || 'Dinheiro' }).eq('id', orderId);
    await db.from('tables').update({ status: 'free' }).eq('id', tableId);
    
    closeModal();
    loadTables();
}

async function loadKitchen() {
    const { data: orders } = await db.from('orders').select('*, tables!inner(number)').eq('status', 'open');
    
    if (!orders || orders.length === 0) {
        document.getElementById('mainContent').innerHTML = '<p style="text-align:center;padding:40px;color:#999">Nenhum pedido 🎉</p>';
        return;
    }
    
    let html = '';
    for (const order of orders) {
        const { data: items } = await db.from('order_items').select('*').eq('order_id', order.id);
        if (items) {
            items.forEach(item => {
                html += `<div class="kitchen-order">
                    <div class="kitchen-order-header">
                        <span class="kitchen-table">Mesa ${order.tables.number}</span>
                        <span>${new Date(item.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div>${item.quantity}x ${item.product_name}</div>
                </div>`;
            });
        }
    }
    
    document.getElementById('mainContent').innerHTML = html || '<p style="text-align:center;padding:40px">Nenhum item</p>';
}

async function loadOrders() {
    const { data: orders } = await db.from('orders').select('*, tables!inner(number)').eq('status', 'open');
    
    if (!orders || orders.length === 0) {
        document.getElementById('mainContent').innerHTML = '<p style="text-align:center;padding:40px;color:#999">Nenhuma comanda</p>';
        return;
    }
    
    document.getElementById('mainContent').innerHTML = orders.map(o => `
        <div class="kitchen-order" onclick="loadTableOrder(${o.table_id})">
            <div class="kitchen-order-header">
                <span class="kitchen-table">Mesa ${o.tables.number}</span>
                <span>${new Date(o.created_at).toLocaleTimeString()}</span>
            </div>
            <div style="font-size:20px;font-weight:700;color:#FF6B35">R$ ${(o.total||0).toFixed(2)}</div>
        </div>
    `).join('');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
</script>
</body>
</html>
